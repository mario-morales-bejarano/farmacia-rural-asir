server {
    listen 80;
    server_name farmasmart.local;

    # Logs para auditoría (Muy importante para ASIR)
    access_log /var/log/farmacia/nginx_access.log;
    error_log /var/log/farmacia/nginx_error.log;

    # Archivos estáticos
    location /static {
        alias /home/farmacia-santaeufemia/proyecto_farmacia/static;
    }

    # Proxy inverso
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
