<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cesta - FarmaSmart</title>
    <style>
        :root { --verde: #27ae60; --dark: #2c3e50; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: url('/static/img/fondo.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        .overlay { background: rgba(255, 255, 255, 0.94); min-height: 100vh; padding: 40px 20px; box-sizing: border-box; }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
        }
        h2 { color: var(--dark); font-size: 3em; border-bottom: 5px solid var(--verde); padding-bottom: 15px; text-align: center; margin-top:0; }
        
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 2px solid #eee; }
        .info-prod { font-size: 1.8em; color: #333; }
        
        .btn-eliminar { 
            background: #e74c3c; color: white; padding: 20px 30px; border-radius: 15px; 
            text-decoration: none; font-weight: bold; font-size: 1.3em; box-shadow: 0 5px 0 #c0392b;
        }
        .btn-eliminar:active { transform: translateY(3px); box-shadow: 0 2px 0 #c0392b; }

        .metodos-pago { margin-top: 50px; text-align: center; background: #f9f9f9; padding: 40px; border-radius: 25px; border: 2px solid #ddd; }
        .btn-pagar { padding: 35px; width: 100%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 2.2em; margin: 15px 0; display: block; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .tarjeta { background: var(--verde); color: white; box-shadow: 0 8px 0 #1e8449; }
        .efectivo { background: #7f8c8d; color: white; box-shadow: 0 8px 0 #616a6b; }
        
        .volver { display: block; text-align: center; margin-top: 40px; color: #3498db; text-decoration: none; font-weight: bold; font-size: 1.8em; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <h2>🛒 RESUMEN DE COMPRA</h2>
            {% if items %}
                {% for item in items %}
                <div class="item-carrito">
                    <div class="info-prod">
                        <strong>{{ item.nombre }}</strong><br>
                        <small>Cantidad: {{ item.cantidad }} uds.</small>
                    </div>
                    <a href="{{ url_for('eliminar', id=item.id) }}" class="btn-eliminar">🗑️ QUITAR</a>
                </div>
                {% endfor %}

                <div class="metodos-pago">
                    <h3 style="font-size: 2.2em; margin-bottom: 25px;">¿CÓMO VA A PAGAR?</h3>
                    <form action="/pagar" method="POST">
                        <button name="metodo" value="TARJETA" class="btn-pagar tarjeta">💳 CON TARJETA</button>
                        <button name="metodo" value="EFECTIVO" class="btn-pagar efectivo">💵 EN EFECTIVO</button>
                    </form>
                </div>
            {% else %}
                <p style="text-align: center; font-size: 2.2em; padding: 50px;">Su cesta está vacía.</p>
            {% endif %}
            <a href="/" class="volver">⬅️ VOLVER A LA LISTA</a>
        </div>
    </div>
</body>
</html>
